  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/IMG_5003.jpeg"
    content: |-
      ### An Engineer with a Passion for Technology and Innovation  
      My name is Hiba, and I’m pursuing a Master’s degree in Data Science with a strong passion for AI, Machine Learning, and Intelligent Systems.  

      My interest in technology started early—I was the curious kid who wanted to know how things worked, from old Nokia phones to the internet itself. At 14, I moved to Sweden, where I quickly picked up new languages and realized that learning—whether human or computer languages—was my strength.  

      During high school and my technical preparatory year, I discovered my love for mathematics and problem-solving. That passion naturally evolved into exploring data science, robotics, and AI, where I found my true direction.  

      Today, I aim to use technology not just as a tool, but as a way to create meaningful solutions and push the boundaries of innovation. With motivation and drive, I’m ready to grow as an engineer and contribute to shaping the future.  

      Here I stand now, filled with motivation and an unwavering drive. I’m ready to take on challenges, grow as an engineer, and contribute to the future of technology. Want to join me on this journey? Let’s create something amazing together!
    skills:
      enable: false
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "HTML"
        - "CSS"
        - "JavaScript"
        - "React"
        - "Node"
        - "Express"

