  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/IMG_5003.jpeg"
    content: |-
      ### An Engineer with a Passion for Technology and Problem Solving
      My name is Hiba, and I am currently pursuing a Master’s degree in Computer Science with a specialization in Machine Learning at KTH Royal Institute of Technology.

      My interest in technology started early, but it was through mathematics, problem-solving, and later AI that I found the field I truly wanted to grow in. Moving to Sweden at a young age also shaped me in many ways, teaching me adaptability, persistence, and the value of continuous learning.

      Over time, that curiosity developed into a strong interest in machine learning, data-driven systems, and intelligent technologies. Today, I am especially motivated by building solutions that are not only technically interesting, but also practical and meaningful in real-world settings.

      I see engineering as a way to combine analytical thinking, creativity, and continuous learning—and I am excited to keep growing through new challenges and opportunities.
    skills:
      enable: false
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "HTML"
        - "CSS"
        - "JavaScript"
        - "React"
        - "Node"
        - "Express"

  # projects
