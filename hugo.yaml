    enable: true
    # title: "Custom Name"
    #title: "Projects"
    featured:
    #items:
      - title: "Causal Time Series Forecasting for Retail Decision-Making (Electrolux Collaboration)"
        content: |-
          Developed a causal machine learning framework in collaboration with Electrolux to estimate the impact of discounts on sales.
          
          Built a large-scale synthetic retail dataset (~450,000 observations across 4,500 products and 100 time periods) to model realistic demand, seasonality, and pricing dynamics.

          Implemented and evaluated models including Random Forest, Gradient Boosting, and EconML for causal inference.

          Identified an average causal increase of approximately 1.68 units in sales per discount unit, demonstrating the value of causal methods over traditional forecasting approaches.
    
        image: /images/projects/elektro.png
        badges:
         - "Causal Inference"
         - "Time Series Forecasting"
         - "Machine Learning"
         - "EconML"
         - "Retail Analytics"
        links:
          - icon: fas fa-file-pdf
            url: "/Project_Draft.pdf"
            type: report

      - title: "Explainable AI for Robustness Evaluation (Master Thesis)"
        content: |-
          Developing an explainable AI (XAI) framework in collaboration with Atlas Copco for evaluating robustness in industrial computer vision systems.

          The project focuses on designing evaluation metrics aligned with the EU AI Act, emphasizing transparency, risk assessment, and model reliability.

          Building a prototype pipeline integrated into a production-like environment (Vision Cockpit platform) and applying explainability methods to analyze model behavior under distribution shifts.

        image: /images/projects/XAI.png
        badges:
         - "Explainable AI (XAI)"
         - "Computer Vision"
         - "Robustness Evaluation"
         - "Industrial AI"

      - title: "Bachelor Thesis: Machines' Interpretation of Sarcasm"
        content: |-
          Developed and evaluated transformer-based NLP models (BERT, GPT-2, T5) for sarcasm detection.

          Built an end-to-end pipeline including data preprocessing, tokenization, model training, and evaluation.

          Compared model performance using standard classification metrics (F1-score, Precision, Recall), where BERT and GPT-2 outperformed T5-base.

          Demonstrated the effectiveness of transformer architectures for nuanced language understanding tasks such as sarcasm detection.
        image: /images/projects/thesis.png
        badges:
          - "Natural Language Processing (NLP)"
          - "Transformer Models"
          - "Text Classification"
          - "Data Analysis"
          - "Model Evaluation"
        links:
          - icon: fas fa-globe
            url: https://www.diva-portal.org/smash/record.jsf?pid=diva2%3A1885505&utm_source=chatgpt.com&dswid=9023
            type: thesis
      
      - title: "Predictive Inventory Management for Stores"
        content: |-
          Developed a predictive inventory model to forecast sales and optimize stock management using a large-scale dataset (500k+ records).

          Built scalable data pipelines using PySpark and processed data using distributed systems (HDFS, Cassandra).

          Analyzed sales patterns and demand trends to support data-driven inventory decisions and improve forecasting accuracy.        
          
        image: /images/projects/inven.png
        badges:
           - "Data Analysis"
           - "Predictive Analytics"
           - "PySpark"
           - "Big Data Processing"
           - "HDFS"
           - "Cassandra"
        links:
          - icon: fab fa-github
            url: https://github.com/HQUT/Data_intensive
            type: code
    other:
      - title: "Headline Generation using BERT Model"
        content: |-
          Fine-tuned the BART transformer model to automatically generate headlines from news articles, evaluated with ROUGE and BERTScore. Built an interactive Gradio interface enabling users to input articles and receive AI-generated headlines.
        image: /images/projects/head.png
        badges:
         - "NLP"
         - "BART"
         - "Text Summarization"
        links:
          - icon: fas fa-file-pdf
            url: "/Headline_Generation.pdf"
            type: report

      - title: "Neural Code Generation with Deep Sequence Models"
        content: |-
          Implemented recurrent models (RNN, single- and two-layer LSTM) for character-level Python code generation using the CodeSearchNet dataset. The two-layer LSTM achieved the best performance, showing the value of deeper architectures for code modeling.        
        image: /images/projects/gen.png
        badges:
          - "Deep Learning"
          - "Recurrent Neural Networks (RNN)"
          - "Code Generation"
          - "PyTorch"
        links:
          - icon: fab fa-github
            url: "https://github.com/HQUT/Deep-Learning-in-Data-Science-/blob/main/Project.ipynb"
            type: code
          - icon: fas fa-file-pdf
            url: "/Neural_Code_Generation.pdf"
            type: report

      - title: "Transforming Static Text into Animated Learning Content Using Generative AI"
        content: |-
          Developed a workflow that transformed static text into animated learning content using generative AI. Combined prompt engineering, text-to-video generation, and AI-based voiceovers to create engaging educational clips. The project demonstrated the potential of multimodal AI for educational technology and digital content creation.
        image: /images/projects/AI.png
        featured:
          name: Demo
          link: https://youtu.be/PhP-11skIVU?si=Qc4Yp1Te-MlKMVho
        badges:
          - "Generative AI"
          - "Text-to-Video"
          - "Prompt Engineering"
          - "Multimodal AI"
        links:
          - icon: fas fa-file-pdf
            url: /GenerativeAI_LearningContent.pdf
            type: report

      - title: "Learning Through Confusion in Human-Robot Interaction"
        content: |-
          Conducted a pilot study with the Furhat robot to explore how different levels of confusion affect learning and engagement in AI tutoring sessions. Designed an experimental framework, collected self-reports, observer ratings, and performance metrics, showing that productive confusion can enhance both engagement and learning.
        image: /images/projects/Furhat.png
        badges:
          - "Human-Robot Interaction"
          - "Furhat Robot"
          - "Experimental Design"
          - "Data Collection & Analysis"
          - "Adaptive Learning Systems"
        links:
          - icon: fab fa-github
            url: https://github.com/andreasnaoum/Learning-Through-Confusion-HRI
            type: code
          - icon: fas fa-file-pdf
            url: /Learning_Through_Confusion.pdf
            type: report

      - title: "Sulfate Soil Classification Tool"
        content: |-
          Collaborated with Ecoloop AB to evaluate and improve the Optimass tool for early detection of sulfate soils. Combined literature research, stakeholder interviews, and AI-based simulations with UI/UX prototyping to enhance usability and support sustainable construction by reducing soil transport and CO₂ emissions.
        image: /images/projects/Optimas.png
        badges:
          - "Sustainable Development"
          - "Industry Collaboration (Ecoloop AB)"
          - "Environmental Impact Assessment"
          - "UI/UX Prototyping"
          - "AI Simulation"
        links:
          - icon: fas fa-file-pdf
            url: "/Sulfate_Soil_Classification.pdf"
            type: report

      - title: "Leafswap: A Digital Bookshelf for Personalized Book Management"
        content: |-
          Developed Leafswap, a digital bookshelf application built with React and hosted on Firebase. Features include smart search, customizable collections, and user profile personalization. The project also strengthened skills in application architecture and scalable component organization.
        image: /images/projects/leaf.png
        featured:
          name: Demo
          link: https://leafswap.web.app/#
        badges:
           - "React"
           - "Firebase"
           - "Web Application"
           - "Smart Search"
           - "UI/UX Design"
           - "Layered Architecture (MVC/MVVM)"

        links:
          - icon: fab fa-github
            url: https://github.com/HQUT/leafswap
            type: code
      
      - title: "Proglin: Enhancing the Programming Learning Experience"
        content: |-
          Developed Proglin, a web application to support programming beginners. The project emphasized agile teamwork, usability, and iterative design, with feedback-driven improvements from KTH student groups. Resulted in a responsive and user-friendly platform built under tight timelines.
        image: /images/projects/P.png
        featured:
          name: Demo
          link: https://proglintech.wixsite.com/proglin
        badges:
          - "React"
          - "Bootstrap"
          - "Web Development"
          - "Agile / Scrum"
          - "UI/UX Design"
          - "Team Collaboration"
          - "Prototyping"
        links:
          - icon: fab fa-github
            url: https://github.com/HQUT/Learn-Programming
            type: code

      - title: "Snake Game: Arcade Experience on ChipKIT UNO32"
        content: |-
          Developed a Snake game on the ChipKIT UNO32 using C and MIPS assembly for embedded execution. Implemented real-time controls via I/O board buttons with features such as fruit collection, snake growth, and collision detection. The project strengthened skills in low-level programming, memory management, and hardware–software integration.
        image: /images/projects/chip.jpg
        badges:
          - "C"
          - "MIPS Assembly"
          - "Embedded Systems"
          - "ChipKIT UNO32"
          - "Game Development"
        #links:
