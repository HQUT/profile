        content: |-
        
          At KTH, I supported engineering students as a Study Coach by sharing effective study strategies and promoting academic success. Through mentorship, I encouraged independent learning and helped students strengthen their problem-solving abilities. The role emphasized leadership, interpersonal communication, and the ability to guide others in developing sustainable study habits.


      - job: "Shift Leader"
