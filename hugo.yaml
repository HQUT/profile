           - Learning internal processes and stakeholder structures rapidly.  


      - job: "Workshop Leader/ Lecturer"
        company: "Unga Forskare- Cybersecurity Academy "
        companyUrl: "https://cybersecurityacademy.se/"
        date: "Sep 2020 - Dec 2021"
        content: |-
          As a Workshop Leader and Lecturer at Unga Forskare’s Cybersecurity Academy, I delivered engaging workshops and presentations tailored to different technical levels. I led hands-on exercises that encouraged problem-solving and critical thinking, while also mentoring students in STEM and cybersecurity. The role combined teaching, mentoring, and adapting complex concepts into accessible and inspiring learning experiences.


      - job: "Study Coach"
