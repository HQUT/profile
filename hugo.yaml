        content: |
          As a Shift Leader at Espresso House, I was responsible for both daily operations and team coordination in a fast-paced environment. The role required strong organizational skills, problem-solving under pressure, and the ability to motivate and guide others while ensuring smooth service and customer satisfaction.
          
          Key responsibilities included:
             - Leading and managing shifts, ensuring tasks were completed and service goals met.  
            - Handling administrative duties such as scheduling, covering sick leave, and coordinating deliveries.  
            - Managing inventory and overseeing stock levels to secure efficient operations.  
            - Training and mentoring new staff, fostering collaboration and a supportive team culture.  
             - Addressing operational and customer-related issues quickly and effectively.  
            - Acting as first-line leadership, ensuring both team performance and high service standards.  

